<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }

  body {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    overflow: hidden;
  }

  .calculator {
    width: 100%;
    max-width: 360px;
    background: rgba(20, 20, 35, 0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 28px;
    padding: 24px;
    box-shadow:
      0 25px 50px -12px rgba(0, 0, 0, 0.5),
      0 0 0 1px rgba(255, 255, 255, 0.05) inset;
  }

  .display {
    background: rgba(0, 0, 0, 0.3);
    border: 1px solid rgba(255, 255, 255, 0.05);
    border-radius: 20px;
    padding: 20px 18px;
    margin-bottom: 20px;
    min-height: 110px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    text-align: right;
    overflow: hidden;
  }

  .history {
    color: rgba(255, 255, 255, 0.4);
    font-size: 14px;
    font-weight: 300;
    min-height: 20px;
    margin-bottom: 6px;
    word-break: break-all;
    letter-spacing: 0.5px;
  }

  .current {
    color: #ffffff;
    font-size: 44px;
    font-weight: 300;
    line-height: 1.1;
    word-break: break-all;
    letter-spacing: -1px;
  }

  .keypad {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }

  button {
    border: none;
    border-radius: 18px;
    height: 60px;
    font-size: 20px;
    font-weight: 500;
    cursor: pointer;
    color: #ffffff;
    background: rgba(255, 255, 255, 0.08);
    transition: all 0.15s ease;
    font-family: inherit;
    user-select: none;
  }

  button:hover {
    background: rgba(255, 255, 255, 0.14);
    transform: translateY(-1px);
  }

  button:active {
    transform: scale(0.95);
    background: rgba(255, 255, 255, 0.2);
  }

  button.op {
    background: rgba(255, 149, 0, 0.85);
    color: #ffffff;
    font-weight: 400;
    font-size: 22px;
  }

  button.op:hover {
    background: rgba(255, 149, 0, 1);
  }

  button.op.active {
    background: #ffffff;
    color: #ff9500;
  }

  button.fn {
    background: rgba(255, 255, 255, 0.15);
    color: #ffffff;
    font-size: 17px;
  }

  button.fn:hover {
    background: rgba(255, 255, 255, 0.22);
  }

  button.equals {
    background: linear-gradient(135deg, #ff9500 0%, #ff7700 100%);
    grid-column: span 4;
    font-size: 24px;
    box-shadow: 0 4px 12px rgba(255, 149, 0, 0.3);
  }

  button.equals:hover {
    background: linear-gradient(135deg, #ffaa20 0%, #ff8800 100%);
    box-shadow: 0 6px 16px rgba(255, 149, 0, 0.4);
  }

  .span-2 {
    grid-column: span 2;
  }

  .hint {
    text-align: center;
    color: rgba(255, 255, 255, 0.35);
    font-size: 12px;
    margin-top: 16px;
    letter-spacing: 0.3px;
  }
</style>
</head>
<body>

<div class="calculator">
  <div class="display">
    <div class="history" id="history"></div>
    <div class="current" id="current">0</div>
  </div>

  <div class="keypad" id="keypad">
    <button class="fn span-2" data-action="clear">AC</button>
    <button class="fn" data-action="sqrt">√</button>
    <button class="op" data-op="/">÷</button>

    <button data-num="7">7</button>
    <button data-num="8">8</button>
    <button data-num="9">9</button>
    <button class="op" data-op="*">×</button>

    <button data-num="4">4</button>
    <button data-num="5">5</button>
    <button data-num="6">6</button>
    <button class="op" data-op="-">−</button>

    <button data-num="1">1</button>
    <button data-num="2">2</button>
    <button data-num="3">3</button>
    <button class="op" data-op="+">+</button>

    <button data-num="0">0</button>
    <button data-action="dot">.</button>
    <button class="fn" data-op="^">xʸ</button>
    <button class="fn" data-op="%">%</button>

    <button class="equals" data-action="equals">=</button>
  </div>

  <div class="hint">Use your keyboard too · Enter = · Esc clear</div>
</div>

<script>
  (function() {
    let current = '0';
    let stored = null;
    let op = null;
    let justEvaluated = false;

    const currentEl = document.getElementById('current');
    const historyEl = document.getElementById('history');
    const keypad = document.getElementById('keypad');

    function format(n) {
      if (!isFinite(n) || isNaN(n)) return 'Error';
      const rounded = Math.round(n * 1e10) / 1e10;
      const str = String(rounded);
      if (str.length > 12) return rounded.toExponential(6);
      return str;
    }

    function opSymbol(o) {
      return { '+': '+', '-': '−', '*': '×', '/': '÷', '^': '^', '%': 'mod' }[o] || o;
    }

    function render() {
      currentEl.textContent = current;
      if (stored !== null && op !== null && !justEvaluated) {
        historyEl.textContent = format(stored) + ' ' + opSymbol(op);
      }
    }

    function highlightOp(o) {
      keypad.querySelectorAll('button.op').forEach(b => b.classList.remove('active'));
      if (o) {
        const btn = keypad.querySelector('button[data-op="' + o + '"]');
        if (btn && btn.classList.contains('op')) btn.classList.add('active');
      }
    }

    function inputNum(n) {
      if (justEvaluated) {
        current = '0';
        historyEl.textContent = '';
        justEvaluated = false;
      }
      if (current === '0') current = n;
      else if (current.length < 14) current += n;
      highlightOp(null);
      render();
    }

    function inputDot() {
      if (justEvaluated) {
        current = '0';
        historyEl.textContent = '';
        justEvaluated = false;
      }
      if (!current.includes('.')) current += '.';
      render();
    }

    function apply(a, b, o) {
      switch (o) {
        case '+': return a + b;
        case '-': return a - b;
        case '*': return a * b;
        case '/': return b === 0 ? NaN : a / b;
        case '%': return b === 0 ? NaN : a - Math.floor(a / b) * b;
        case '^': return Math.pow(a, b);
      }
      return b;
    }

    function setOp(newOp) {
      const val = parseFloat(current);
      if (stored === null) {
        stored = val;
      } else if (op !== null && !justEvaluated) {
        const result = apply(stored, val, op);
        stored = result;
        current = format(result);
        currentEl.textContent = current;
      }
      op = newOp;
      justEvaluated = false;
      historyEl.textContent = format(stored) + ' ' + opSymbol(op);
      highlightOp(newOp);
      // mark that we want fresh input next
      pendingClear = true;
    }

    let pendingClear = false;

    // wrap inputNum to clear current when an op was just pressed
    const _origInputNum = inputNum;
    inputNum = function(n) {
      if (pendingClear) {
        current = '0';
        pendingClear = false;
      }
      _origInputNum(n);
    };
    const _origInputDot = inputDot;
    inputDot = function() {
      if (pendingClear) {
        current = '0';
        pendingClear = false;
      }
      _origInputDot();
    };

    function equals() {
      if (op === null || stored === null) return;
      const val = parseFloat(current);
      const result = apply(stored, val, op);
      historyEl.textContent = format(stored) + ' ' + opSymbol(op) + ' ' + format(val) + ' =';
      current = format(result);
      stored = null;
      op = null;
      justEvaluated = true;
      pendingClear = false;
      highlightOp(null);
      currentEl.textContent = current;
    }

    function clearAll() {
      current = '0';
      stored = null;
      op = null;
      justEvaluated = false;
      pendingClear = false;
      historyEl.textContent = '';
      highlightOp(null);
      render();
    }

    function sqrtOp() {
      const val = parseFloat(current);
      if (val < 0) {
        current = 'Error';
      } else {
        const result = Math.sqrt(val);
        historyEl.textContent = '√' + format(val) + ' =';
        current = format(result);
      }
      justEvaluated = true;
      pendingClear = false;
      highlightOp(null);
      currentEl.textContent = current;
    }

    keypad.addEventListener('click', function(e) {
      const btn = e.target.closest('button');
      if (!btn) return;
      if (btn.dataset.num !== undefined) inputNum(btn.dataset.num);
      else if (btn.dataset.op) setOp(btn.dataset.op);
      else if (btn.dataset.action === 'equals') equals();
      else if (btn.dataset.action === 'clear') clearAll();
      else if (btn.dataset.action === 'dot') inputDot();
      else if (btn.dataset.action === 'sqrt') sqrtOp();
    });

    document.addEventListener('keydown', function(e) {
      if (e.key >= '0' && e.key <= '9') inputNum(e.key);
      else if (e.key === '.') inputDot();
      else if (['+', '-', '*', '/', '%', '^'].includes(e.key)) setOp(e.key);
      else if (e.key === 'Enter' || e.key === '=') { e.preventDefault(); equals(); }
      else if (e.key === 'Escape') clearAll();
      else if (e.key === 'Backspace') {
        if (!justEvaluated && current.length > 1) current = current.slice(0, -1);
        else current = '0';
        render();
      }
    });

    render();
  })();
</script>

</body>
</html>
